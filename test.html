<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Box Design</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#020814;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    display:flex;
    align-items:center;
    gap:30px;
    padding:40px;
    background:linear-gradient(to right,#022d2b,#030a25,#12042d);
}

.box{
    width:90px;
    height:90px;
    border-radius:18px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,0.1);
    box-shadow:0 0 15px rgba(255,255,255,0.08);
    position:relative;
}

.box img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.line{
    width:35px;
    height:1px;
    background:rgba(255,255,255,0.2);
}
</style>
</head>
<body>

<div class="container">

    <div class="box">
        <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb" alt="">
    </div>

    <div class="line"></div>

    <div class="box">
        <img src="https://images.unsplash.com/photo-1493246507139-91e8fad9978e" alt="">
    </div>

    <div class="line"></div>

    <div class="box">
        <img src="https://images.unsplash.com/photo-1516117172878-fd2c41f4a759" alt="">
    </div>

    <div class="line"></div>

    <div class="box">
        <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee" alt="">
    </div>

</div>

</body>
</html>
